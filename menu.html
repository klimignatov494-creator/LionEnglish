<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Главное меню</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    color: white;
    background: linear-gradient(-45deg, #1cc88a, #4e73df, #36b9cc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

.homework {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 320px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 15px;
}

.homework h2 {
    text-align: center;
    margin-bottom: 10px;
}

.homework ul {
    list-style: none;
    padding: 0;
}

.homework li {
    padding: 6px;
    margin-bottom: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.homework button {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.addBtn {
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.container {
    text-align: center;
    padding: 30px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    width: 400px;
    margin: 150px auto;
}

button.main {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.3);
    color: white;
    font-size: 16px;
}
</style>
</head>
<body>

<div class="homework">
    <h2>📎 Домашнее задание</h2>
    <ul id="homeworkList"></ul>
    <button id="addHomeworkBtn" class="addBtn" onclick="addHomework()">➕ Добавить</button>
</div>

<div class="container">
    <h1 id="welcomeText"></h1>
    <button class="main">📖 Начать урок</button>
    <button class="main">📝 Пройти тест</button>
    <button class="main">🏆 Мои достижения</button>
    <button class="main" onclick="logout()">🚪 Выйти</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// =======================
// 🔑 Вставь сюда свой Firebase конфиг
// =======================
const firebaseConfig = {
  apiKey: "AIzaSyD25dA37Mma0p4xgh3nPxiRRwBALirZgAI",
  authDomain: "englishapp-f7c94.firebaseapp.com",
  projectId: "englishapp-f7c94",
  storageBucket: "englishapp-f7c94.firebasestorage.app",
  messagingSenderId: "663428608138",
  appId: "1:663428608138:веб:326d35103a2f2a8d697d73"
};
// =======================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =======================
// Получаем роль и класс
// =======================
const userRole = localStorage.getItem("userRole");
const studentClass = localStorage.getItem("studentClass");

const homeworkList = document.getElementById("homeworkList");
const addBtn = document.getElementById("addHomeworkBtn");

if(userRole !== "teacher"){
    addBtn.style.display = "none";
}

document.getElementById("welcomeText").innerText =
    "Здравствуйте, " + localStorage.getItem("userName") +
    (userRole === "teacher" ? " (Учитель)" : " (Ученик)");

// =======================
// Загрузка домашки
// =======================
async function loadHomework(){
    homeworkList.innerHTML = "";
    const querySnapshot = await getDocs(collection(db, "homework"));

    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();

        // 👀 ученик видит только свой класс
        if(userRole === "student" && data.class !== studentClass){
            return;
        }

        const li = document.createElement("li");
        li.textContent = data.text + " (" + data.class + ")";

        if(userRole === "teacher"){
            const delBtn = document.createElement("button");
            delBtn.textContent = "❌";
            delBtn.onclick = async () => {
                await deleteDoc(doc(db, "homework", docSnap.id));
                loadHomework();
            };
            li.appendChild(delBtn);
        }

        homeworkList.appendChild(li);
    });
}

// =======================
// Добавление домашки
// =======================
window.addHomework = async function(){
    const text = prompt("Введите задание:");
    if(!text) return;

    const classChoice = prompt("Введите класс (например 5А):");
    if(!classChoice) return;

    await addDoc(collection(db, "homework"), {
        text: text,
        class: classChoice
    });

    loadHomework();
}

// =======================
// Выход
// =======================
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

// =======================
// Начальная загрузка
// =======================
loadHomework();

</script>

</body>
</html>
